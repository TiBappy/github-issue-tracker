<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github || Issue</title>
    <!-- DaisyUI & Tailwind css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- StyleSheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-green-50 max-w-md mx-auto min-h-screen">
    
     <div class="pt-10 w-[130px] mx-auto">
        <img src="./assets/github-logo.png" alt="">
       
     </div>
     <div>
       <h2 class="font-bold text-2xl text-center pt-4">Github Issue Tracker</h2>
       <p class="text-center text-neutral-400">sign in to manage your issues</p>
     </div>

     <div class="form pt-8">
         <div class="card bg-base-200 w-full max-w-sm shrink-0 shadow mx-auto">
          <div class="card-body p-8">
            <fieldset class="fieldset">
              <label class="label text-xl font-semibold">Username</label>
              <input id="Username" type="text" class="input text-md font-semibold" placeholder="Enter Username" />
              <label class="label text-xl font-semibold">Password</label>
              <input id="password" type="password" class="input text-md font-semibold" placeholder="Password" />
              <div><a class="link link-hover text-xl font-semibold">Forgot password?</a></div>
              <button id="sign-in-btn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
          </div>
        </div>
  </div>
     </div>
    <script src="./login.js"></script>
  </body>
</html>
